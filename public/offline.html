<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Offline — BLANCO</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
        padding: 32px;
        background-color: #2f1c14;
        color: #f5f1e6;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      h1 {
        font-size: 22px;
        margin: 0;
      }

      p {
        font-size: 15px;
        opacity: 0.85;
        margin: 0;
        max-width: 380px;
      }

      button {
        margin-top: 10px;
        border: 0;
        border-radius: 999px;
        padding: 12px 28px;
        font-size: 15px;
        font-weight: 700;
        color: #2f1c14;
        background: #f5f1e6;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>You're offline | لا يوجد اتصال بالإنترنت</h1>
    <p>
      Check your connection and try again. Once you're back online the menu
      will load normally.
      <br />
      تحقق من اتصالك بالإنترنت وحاول مرة أخرى.
    </p>
    <button type="button" onclick="location.reload()">Retry | إعادة المحاولة</button>
  </body>
</html>
